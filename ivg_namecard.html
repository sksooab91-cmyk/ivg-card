<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IVG 명함</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #f0f0f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px;
  gap: 20px;
  min-height: 100vh;
}
.editor {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 20px 24px;
  width: 100%;
  max-width: 980px;
}
.editor h3 {
  font-size: 11px;
  font-weight: 700;
  color: #888;
  margin-bottom: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.editor-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.editor-grid label {
  display: flex;
  flex-direction: column;
  gap: 3px;
  font-size: 11px;
  color: #999;
  font-weight: 600;
}
.editor-grid input {
  border: 1px solid #e0e0e0;
  border-radius: 5px;
  padding: 7px 9px;
  font-size: 12px;
  color: #222;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.editor-grid input:focus { border-color: #1c3eb8; }
.card {
  background: #fff;
  width: 1000px;
  height: 300px;
  display: flex;
  align-items: stretch;
  box-shadow: 0 1px 6px rgba(0,0,0,0.12);
  border-radius: 2px;
  flex-shrink: 0;
}
.card-logo {
  background: #1c3eb8;
  width: 275px;
  min-width: 275px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding: 35px 32px;
}
.card-logo img { width: 100%; height: auto; display: block; }
.card-info {
  padding: 35px 45px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  flex: 1;
  overflow: hidden;
}
.info-name {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 8px;
}
.name-kr {
  font-size: 38px;
  font-weight: 900;
  color: #1c3eb8;
  letter-spacing: 6px;
  line-height: 1;
}
.name-en {
  font-size: 25px;
  font-weight: 700;
  color: #1c3eb8;
  line-height: 1;
}
.info-title {
  font-size: 16px;
  color: #222;
  line-height: 1.7;
  margin-bottom: 18px;
}
.info-contacts { display: flex; flex-direction: column; gap: 8px; }
.contact-row { display: flex; align-items: center; gap: 9px; font-size: 16px; color: #111; }
.icon {
  width: 26px; height: 26px;
  background: #1c3eb8;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.contact-inline { display: flex; align-items: center; gap: 50px; }
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: #1c3eb8;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 0;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
  width: 1000px;
  flex-shrink: 0;
}
.btn:hover { background: #1530a0; }
.save-page {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.save-page.active { display: flex; }
.save-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: #1c3eb8;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 0;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
  width: 1000px;
  flex-shrink: 0;
}
.save-btn:hover { background: #1530a0; }
.save-btn:disabled { background: #aaa; cursor: default; }
.edit-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
</style>
</head>
<body>

<div class="edit-page" id="edit-page">
  <div class="editor">
    <h3>✏️ 텍스트 편집</h3>
    <div class="editor-grid">

      <label>직책 (한국어)<input id="f-title-kr" value="파트장 / 디자인센터" oninput="update()"></label>
      <label>직책 (영문)<input id="f-title-en" value="Part Lead / Design Center" oninput="update()"></label>
      <label>이메일<input id="f-email" value="sjlee@ivg.co.kr" oninput="update()"></label>
      <label>전화번호<input id="f-phone" value="+82 10-8276-2287" oninput="update()"></label>
      <label style="grid-column:span 2">주소<input id="f-addr" value="경기도 고양시 덕양구 청초로 10, 덕은지엘메트로시티 지식산업센터 AA 1505호" oninput="update()"></label>

              <svg width="15" height="15" viewBox="0 0 24 24" fill="none">

<script>
function update() {
  document.getElementById('d-name-kr').textContent = document.getElementById('f-name-kr').value;
  document.getElementById('d-name-en').textContent = document.getElementById('f-name-en').value;
  document.getElementById('d-title-kr').textContent = document.getElementById('f-title-kr').value;
  document.getElementById('d-title-en').textContent = document.getElementById('f-title-en').value;
  document.getElementById('d-email').textContent = document.getElementById('f-email').value;
  document.getElementById('d-phone').textContent = document.getElementById('f-phone').value;
  document.getElementById('d-addr').textContent = document.getElementById('f-addr').value;
}

function openSavePage() {
  const params = new URLSearchParams({
    nameKr: document.getElementById('f-name-kr').value,
    nameEn: document.getElementById('f-name-en').value,
    titleKr: document.getElementById('f-title-kr').value,
    titleEn: document.getElementById('f-title-en').value,
    email: document.getElementById('f-email').value,
    phone: document.getElementById('f-phone').value,
    addr: document.getElementById('f-addr').value,
    mode: 'save'
  });
  window.open('https://sksooab91-cmyk.github.io/ivg-card/ivg_namecard.html?' + params.toString(), '_blank');
}

function loadFromParams() {
  const p = new URLSearchParams(location.search);
  if (p.get('mode') === 'save') {
    document.getElementById('edit-page').style.display = 'none';
    document.getElementById('save-page').classList.add('active');
    document.getElementById('s-name-kr').textContent = p.get('nameKr') || '';
    document.getElementById('s-name-en').textContent = p.get('nameEn') || '';
    document.getElementById('s-title-kr').textContent = p.get('titleKr') || '';
    document.getElementById('s-title-en').textContent = p.get('titleEn') || '';
    document.getElementById('s-email').textContent = p.get('email') || '';
    document.getElementById('s-phone').textContent = p.get('phone') || '';
    document.getElementById('s-addr').textContent = p.get('addr') || '';
  }
}

function saveImage() {
  const btn = document.getElementById('save-btn');
  btn.textContent = '저장 중...';
  btn.disabled = true;
  const card = document.getElementById('card-save');
  card.style.boxShadow = 'none';
  html2canvas(card, {
    scale: 1,
    useCORS: true,
    backgroundColor: '#ffffff',
    logging: false,
    width: 1000,
    height: 300
  }).then(canvas => {
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = 1000;
    finalCanvas.height = 300;
    const ctx = finalCanvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, 1000, 300);
    ctx.drawImage(canvas, 0, 0, 1000, 300);
    const link = document.createElement('a');
    link.download = '이메일서명.png';
    link.href = finalCanvas.toDataURL('image/png');
    link.click();
    card.style.boxShadow = '';
    btn.textContent = '⬇️ PNG로 저장 (1000×300)';
    btn.disabled = false;
  });
}

loadFromParams();
</script>
