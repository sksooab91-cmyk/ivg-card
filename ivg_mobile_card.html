<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IVG 모바일 명함</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #f0f0f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px;
  gap: 20px;
  min-height: 100vh;
}
.editor {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 20px 24px;
  width: 100%;
  max-width: 780px;
}
.editor h3 {
  font-size: 11px;
  font-weight: 700;
  color: #888;
  margin-bottom: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.editor-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.editor-grid label {
  display: flex;
  flex-direction: column;
  gap: 3px;
  font-size: 11px;
  color: #999;
  font-weight: 600;
}
.editor-grid input,
.editor-grid select {
  border: 1px solid #e0e0e0;
  border-radius: 5px;
  padding: 7px 9px;
  font-size: 12px;
  color: #222;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
  background: #fff;
}
.editor-grid input:focus,
.editor-grid select:focus { border-color: #1c3eb8; }

.card {
  background: #fff;
  width: 540px;
  height: 835px;
  display: flex;
  flex-direction: column;
  padding: 64px 48px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.12);
  border-radius: 2px;
  flex-shrink: 0;
}
.card-logo {
  width: 100%;
  max-width: 380px;
}
.card-logo img { width: 100%; height: auto; display: block; }

.card-spacer { flex: 1; }

.name-kr {
  font-size: 44px;
  font-weight: 900;
  color: #1c3eb8;
  letter-spacing: 8px;
  line-height: 1.2;
}
.name-en {
  font-size: 24px;
  font-weight: 500;
  color: #1c3eb8;
  margin-top: 6px;
}

.info-title {
  font-size: 18px;
  color: #222;
  line-height: 1.6;
  margin-top: 28px;
}

.card-spacer2 { flex: 1; }

.info-contacts {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.contact-row-bold {
  font-size: 22px;
  font-weight: 800;
  color: #1c3eb8;
}
.addr-row {
  font-size: 16px;
  color: #222;
  line-height: 1.5;
  margin-top: 16px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: #1c3eb8;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 0;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
  width: 540px;
  flex-shrink: 0;
}
.btn:hover { background: #1530a0; }
.save-page {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.save-page.active { display: flex; }
.save-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: #1c3eb8;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 0;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
  width: 540px;
  flex-shrink: 0;
}
.save-btn:hover { background: #1530a0; }
.save-btn:disabled { background: #aaa; cursor: default; }
.edit-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
</style>
</head>
<body>

<div class="edit-page" id="edit-page">
  <div class="editor">
    <h3>✏️ 텍스트 편집</h3>
    <div class="editor-grid">
      <label>이름 (한국어)<input id="f-name-kr" value="이수진" oninput="update()"></label>
      <label>이름 (영문)<input id="f-name-en" value="Sujin Lee" oninput="update()"></label>
      <label>부서/직책 (한국어)<input id="f-title-kr" value="디자인센터 / 파트장" oninput="update()"></label>
      <label>부서/직책 (영문)<input id="f-title-en" value="Design Center / Part Lead" oninput="update()"></label>
      <label>전화번호 (예: 01082762287)<input id="f-phone" value="01082762287" oninput="update()"></label>
      <label>이메일<input id="f-email" value="sjlee@ivg.co.kr" oninput="update()"></label>
      <label style="grid-column:span 2">주소<input id="f-addr" value="경기도 고양시 덕양구 청초로 10, 덕은GL메트로시티한강 A1 1505" oninput="update()"></label>
    </div>
  </div>

<script>
function formatPhone(raw) {
  const digits = raw.replace(/\D/g, '');
  if (digits.length === 11 && digits.startsWith('010')) {
    return '+82 ' + digits.slice(1,3) + ' ' + digits.slice(3,7) + ' ' + digits.slice(7);
  }
  if (digits.length === 10 && digits.startsWith('01')) {
    return '+82 ' + digits.slice(1,2) + ' ' + digits.slice(2,6) + ' ' + digits.slice(6);
  }
  return raw;
}

function update() {
  document.getElementById('d-name-kr').textContent = document.getElementById('f-name-kr').value;
  document.getElementById('d-name-en').textContent = document.getElementById('f-name-en').value;
  document.getElementById('d-title-kr').textContent = document.getElementById('f-title-kr').value;
  document.getElementById('d-title-en').textContent = document.getElementById('f-title-en').value;
  document.getElementById('d-phone').textContent = formatPhone(document.getElementById('f-phone').value);
  document.getElementById('d-email').textContent = document.getElementById('f-email').value;
  document.getElementById('d-addr').textContent = document.getElementById('f-addr').value;
}

function openSavePage() {
  const params = new URLSearchParams({
    nameKr: document.getElementById('f-name-kr').value,
    nameEn: document.getElementById('f-name-en').value,
    titleKr: document.getElementById('f-title-kr').value,
    titleEn: document.getElementById('f-title-en').value,
    phone: formatPhone(document.getElementById('f-phone').value),
    email: document.getElementById('f-email').value,
    addr: document.getElementById('f-addr').value,
    mode: 'save'
  });
  window.open('https://sksooab91-cmyk.github.io/ivg-card/ivg_mobile_card.html?' + params.toString(), '_blank');
}

function loadFromParams() {
  const p = new URLSearchParams(location.search);
  if (p.get('mode') === 'save') {
    document.getElementById('edit-page').style.display = 'none';
    document.getElementById('save-page').classList.add('active');
    document.getElementById('s-name-kr').textContent = p.get('nameKr') || '';
    document.getElementById('s-name-en').textContent = p.get('nameEn') || '';
    document.getElementById('s-title-kr').textContent = p.get('titleKr') || '';
    document.getElementById('s-title-en').textContent = p.get('titleEn') || '';
    document.getElementById('s-phone').textContent = p.get('phone') || '';
    document.getElementById('s-email').textContent = p.get('email') || '';
    document.getElementById('s-addr').textContent = p.get('addr') || '';
  }
}

function saveImage() {
  const btn = document.getElementById('save-btn');
  btn.textContent = '저장 중...';
  btn.disabled = true;
  const card = document.getElementById('card-save');
  card.style.boxShadow = 'none';
  html2canvas(card, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#ffffff',
    logging: false,
    width: 540,
    height: 835
  }).then(canvas => {
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = 1080;
    finalCanvas.height = 1670;
    const ctx = finalCanvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, 1080, 1670);
    ctx.drawImage(canvas, 0, 0, 1080, 1670);
    const link = document.createElement('a');
    link.download = '모바일명함.png';
    link.href = finalCanvas.toDataURL('image/png');
    link.click();
    card.style.boxShadow = '';
    btn.textContent = '⬇️ PNG로 저장 (1080×1670)';
    btn.disabled = false;
  });
}

loadFromParams();
update();
</script>
</body>
</html>
